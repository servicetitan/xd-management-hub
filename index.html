<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XD Management Hub</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0; cursor: pointer; position: absolute; right: 8px; width: 20px; height: 20px; }
      input[type="date"] { position: relative; }
      button { transition: filter 0.15s ease, opacity 0.15s ease; }
      button:hover:not(:disabled) { filter: brightness(0.91); }
      button:active:not(:disabled) { filter: brightness(0.83); }
      button:focus-visible { outline: 2px solid #2563EB; outline-offset: 2px; }
      input:focus, textarea:focus { border-color: #2563EB !important; box-shadow: 0 0 0 3px rgba(37,99,235,0.15) !important; outline: none !important; }
      select:focus { outline: 2px solid #2563EB; outline-offset: 2px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
